<!DOCTYPE html>
<html>

<head>
<title>Results</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Candidate Ranking</h1>

<table>

<tr>
<th>Candidate</th>
<th>Score</th>
<th>Status</th>
</tr>

{% for r in results %}

<tr>

<td>{{r.name}}</td>

<td>

<div class="progress">

<div class="progress-bar"
style= "width : { { r.score }}%">

{{r.score}}%

<div></div>

</div>

</div>

</td>

<td>{{r.status}}</td>

</tr>

{% endfor %}

</table>

<a href="/">
<button class="btn">Back</button>
</a>

</div>

</body>
</html>
